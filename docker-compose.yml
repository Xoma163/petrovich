services:
  postgres:
    image: postgres:18-alpine
    container_name: petrovich-local-postgres
    environment:
      POSTGRES_DB: petrovich
      POSTGRES_USER: petrovich
      POSTGRES_PASSWORD: petrovich
    ports:
      - "127.0.0.1:15433:5432"
    volumes:
      - petrovich-local-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petrovich -d petrovich"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: petrovich-local-redis
    ports:
      - "127.0.0.1:16380:6379"
    volumes:
      - petrovich-local-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  petrovich-local-postgres:
  petrovich-local-redis:
